name: ReverieControl
options:
  bundleIdPrefix: com.reverie
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: ReverieControl/Info.plist

targets:
  ReverieControl:
    type: application
    platform: iOS
    sources:
      - path: ReverieControl
        excludes:
          - "Info.plist"
    info:
      path: ReverieControl/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reverie.ReverieControl
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: ReverieControl/ReverieControl.entitlements
      properties:
        com.apple.developer.usernotifications.communication: true
